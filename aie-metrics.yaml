version: "1"

project:
  name: crap-cms
  language: rust
  src_dirs: [src/]
  test_dirs: [tests/]

# Documentation files for feature ideation (optional)
docs: [README.md]

metrics:
  dockerfile_issues:
    description: "Hadolint Dockerfile lint violations"
    unit: count
    direction: lower_is_better
    target: 0
    source:
      command: "hadolint Dockerfile --format json"
      parser: hadolint_json

  secrets_detected:
    description: "Detected secrets in source"
    unit: count
    direction: lower_is_better
    target: 0
    source:
      command: "detect-secrets scan src/"
      parser: detect_secrets_json

  todo_count:
    description: "TODO/FIXME/HACK comments"
    unit: count
    direction: lower_is_better
    target: 0
    source:
      command: "grep -rn 'TODO\\|FIXME\\|HACK\\|XXX' src/ || true"
      parser: todo_grep

constraints:
  max_files_per_improvement: 5
  # max_improvements_per_run: 3  # omit for unlimited (all fixes)
  allow_new_dependencies: false
  allow_schema_changes: false
  require_tests: true
  min_confidence: 0.7
  require_approval: true
