name: Nightly

on:
  push:
    branches: [main]
    tags-ignore: ["**"]

permissions:
  contents: write
  packages: write
  pages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Linux (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            artifact: crap-cms-linux-x86_64
          - target: aarch64-unknown-linux-musl
            artifact: crap-cms-linux-aarch64
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: cross build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/crap-cms ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  docker:
    name: Docker nightly
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: crap-cms-linux-x86_64

      - uses: actions/download-artifact@v4
        with:
          name: crap-cms-linux-aarch64

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: BINARY=crap-cms-linux-x86_64
          tags: |
            ghcr.io/dkluhzeb/crap-cms:nightly-amd64
            ghcr.io/dkluhzeb/crap-cms:sha-${{ github.sha }}-amd64

      - name: Build and push (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          build-args: BINARY=crap-cms-linux-aarch64
          tags: |
            ghcr.io/dkluhzeb/crap-cms:nightly-arm64
            ghcr.io/dkluhzeb/crap-cms:sha-${{ github.sha }}-arm64

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create -t ghcr.io/dkluhzeb/crap-cms:nightly \
            ghcr.io/dkluhzeb/crap-cms:nightly-amd64 \
            ghcr.io/dkluhzeb/crap-cms:nightly-arm64
          docker buildx imagetools create -t ghcr.io/dkluhzeb/crap-cms:sha-${{ github.sha }} \
            ghcr.io/dkluhzeb/crap-cms:sha-${{ github.sha }}-amd64 \
            ghcr.io/dkluhzeb/crap-cms:sha-${{ github.sha }}-arm64

  docs:
    name: Deploy docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdbook
        run: |
          tag=$(curl -sSL -o /dev/null -w '%{url_effective}' https://github.com/rust-lang/mdBook/releases/latest | grep -oP '[^/]+$')
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/${tag}/mdbook-${tag}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar xz -C /usr/local/bin

      - name: Build book
        run: cd docs && mdbook build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/book
